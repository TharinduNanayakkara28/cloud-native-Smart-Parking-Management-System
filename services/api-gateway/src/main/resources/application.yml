server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-route
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**

        - id: user-route
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/users/**
          filters:
            - JwtAuthentication

jwt:
  secret: ${JWT_SECRET:change-me-in-production-this-must-be-32chars!}

management:
  endpoints:
    web:
      exposure:
        include: health
