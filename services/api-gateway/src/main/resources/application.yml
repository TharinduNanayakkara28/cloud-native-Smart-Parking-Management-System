server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Phase 1 — User Service
        - id: auth-route
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**

        - id: user-route
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/users/**
          filters:
            - JwtAuthentication

        # Phase 2 — Sensor Simulator (no JWT — admin/demo control)
        - id: simulator-route
          uri: ${SIMULATOR_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/simulate/**

        # Phase 3 — Availability Service: /spots/available BEFORE /spots/** catch-all
        - id: availability-query-route
          uri: ${AVAILABILITY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/spots/available
          filters:
            - JwtAuthentication

        - id: availability-state-route
          uri: ${AVAILABILITY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/spots/state
          filters:
            - JwtAuthentication

        # Phase 3 — WebSocket (STOMP/SockJS — no JWT on connect)
        - id: ws-availability-route
          uri: ${AVAILABILITY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/ws/availability/**

        # Phase 4 — Reservation Service (JWT protected)
        - id: reservation-route
          uri: ${RESERVATION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/reservations/**
          filters:
            - JwtAuthentication

        # Phase 5 — Payment Service (JWT protected)
        - id: payment-route
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/payments/**
          filters:
            - JwtAuthentication

        # Phase 6 — Penalty Service (JWT protected)
        - id: penalty-route
          uri: ${PENALTY_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/penalties/**
          filters:
            - JwtAuthentication

        # Phase 7 — Notification Service (JWT protected)
        - id: notification-route
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/notifications/**
          filters:
            - JwtAuthentication

        # Phase 8 — Analytics Service (JWT protected)
        - id: analytics-route
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/analytics/**
          filters:
            - JwtAuthentication

        # Phase 2 — Spot Detection Service admin (JWT protected)
        - id: spot-admin-route
          uri: ${SPOT_DETECTION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/spots/**
          filters:
            - JwtAuthentication

jwt:
  secret: ${JWT_SECRET:change-me-in-production-this-must-be-32chars!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
