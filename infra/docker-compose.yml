version: '3.8'

services:

  # ──────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-spot-detection:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: spotdetectiondb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_spot_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spotdetectiondb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-availability:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: availabilitydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_availability_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d availabilitydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-reservation:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reservationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_reservation_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reservationdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Phase 1: User Service + API Gateway
  # ──────────────────────────────────────────

  user-service:
    build:
      context: ../services/user-service
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-user:5432/userdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dev-secret-key-change-in-production-32chars!
    depends_on:
      postgres-user:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build:
      context: ../services/api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8081
      SIMULATOR_SERVICE_URL: http://sensor-simulator:8082
      SPOT_DETECTION_SERVICE_URL: http://spot-detection-service:8083
      AVAILABILITY_SERVICE_URL: http://availability-service:8084
      RESERVATION_SERVICE_URL: http://reservation-service:8085
      PAYMENT_SERVICE_URL: http://payment-service:8086
      PENALTY_SERVICE_URL: http://penalty-service:8087
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
      ANALYTICS_SERVICE_URL: http://analytics-service:8089
      JWT_SECRET: dev-secret-key-change-in-production-32chars!
    depends_on:
      user-service:
        condition: service_healthy

  # ──────────────────────────────────────────
  # Phase 1: API Gateway (env update for Phase 3)
  # ──────────────────────────────────────────

  # ──────────────────────────────────────────
  # Phase 2: Sensor Simulator + Spot Detection
  # ──────────────────────────────────────────

  sensor-simulator:
    build:
      context: ../services/sensor-simulator
    ports:
      - "8082:8082"
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  spot-detection-service:
    build:
      context: ../services/spot-detection-service
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-spot-detection:5432/spotdetectiondb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKER: kafka:9092
    depends_on:
      postgres-spot-detection:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────
  # Phase 3: Availability Service
  # ──────────────────────────────────────────

  availability-service:
    build:
      context: ../services/availability-service
    ports:
      - "8084:8084"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-availability:5432/availabilitydb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      KAFKA_BROKER: kafka:9092
    depends_on:
      postgres-availability:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────
  # Phase 4: Reservation Service
  # ──────────────────────────────────────────

  reservation-service:
    build:
      context: ../services/reservation-service
    ports:
      - "8085:8085"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-reservation:5432/reservationdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      KAFKA_BROKER: kafka:9092
      AVAILABILITY_SERVICE_URL: http://availability-service:8084
    depends_on:
      postgres-reservation:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      availability-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────
  # Phase 5: Payment Service
  # ──────────────────────────────────────────

  postgres-payment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paymentdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: ../services/payment-service
    ports:
      - "8086:8086"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-payment:5432/paymentdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKER: kafka:9092
      PAYMENT_HOURLY_RATE: "2.00"
      PAYMENT_CURRENCY: USD
      MOCK_FAILURE_RATE: "0.0"
    depends_on:
      postgres-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────
  # Phase 6: Penalty Service
  # ──────────────────────────────────────────

  postgres-penalty:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: penaltydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - postgres_penalty_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d penaltydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  penalty-service:
    build:
      context: ../services/penalty-service
    ports:
      - "8087:8087"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-penalty:5432/penaltydb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      KAFKA_BROKER: kafka:9092
      PENALTY_TIER2_AMOUNT: "10.00"
      PENALTY_TIER3_AMOUNT: "25.00"
    depends_on:
      postgres-penalty:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────
  # Phase 7: Notification Service
  # ──────────────────────────────────────────

  postgres-notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notificationdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ../services/notification-service
    ports:
      - "8088:8088"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-notification:5432/notificationdb
      DB_USER: postgres
      DB_PASS: postgres
      KAFKA_BROKER: kafka:9092
    depends_on:
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────
  # Phase 8: Analytics Service
  # ──────────────────────────────────────────

  postgres-analytics:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analyticsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analyticsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-service:
    build:
      context: ../services/analytics-service
    ports:
      - "8089:8089"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-analytics:5432/analyticsdb
      DB_USER: postgres
      DB_PASS: postgres
      KAFKA_BROKER: kafka:9092
    depends_on:
      postgres-analytics:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8089/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────
  # Phase 9: Monitoring — Prometheus + Grafana
  # ──────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  kafka_data:
  postgres_user_data:
  postgres_spot_data:
  postgres_availability_data:
  postgres_reservation_data:
  postgres_payment_data:
  postgres_penalty_data:
  postgres_notification_data:
  postgres_analytics_data:
  prometheus_data:
  grafana_data:
  redis_data:
