version: '3.8'

services:

  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ../services/user-service
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-user:5432/userdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dev-secret-key-change-in-production-32chars!
    depends_on:
      postgres-user:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build:
      context: ../services/api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8081
      JWT_SECRET: dev-secret-key-change-in-production-32chars!
    depends_on:
      user-service:
        condition: service_healthy

volumes:
  postgres_user_data:
